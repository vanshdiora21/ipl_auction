name: Fantasy Points Tracker

on:
  schedule:
    # 8:00 PM IST = 2:30 PM UTC
    - cron: '30 14 * * *'
  workflow_dispatch:   # lets you trigger manually from GitHub UI anytime

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python3 fantasy_points_tracker.py

      - name: Commit updated Excel back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.xlsx
          git diff --staged --quiet || git commit -m "Auto-update: fantasy points $(date +'%d-%b-%Y')"
          git push